services:
  agent:
    build:
      dockerfile: Dockerfile.agent
    ports:
      - "8000:8000"
      - "3100:3100"
    volumes:
      - .:/app
      - .codex/container:/root/.codex

  frontend:
    build: .
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - .:/app
    command: bun run dev --host 0.0.0.0 --port 3000
