services:
  agent:
    build:
      dockerfile: Dockerfile.agent
    command: task-factory start -h 0.0.0.0
    ports:
      - "8000:3000"
    volumes:
      - .:/app
      - .codex/container:/root/.codex

  frontend:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: bun run dev --host 0.0.0.0 --port 3000
