services:
  agent:
    build:
      dockerfile: Dockerfile.agent
    environment:
      OPENAI_BASE_URL: https://ai.vpn.dzerv.art/v1
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: bun run dev --host 0.0.0.0 --port 3000
