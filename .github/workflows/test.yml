name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  bun-lanes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bunx playwright install --with-deps

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
      - name: Test
        run: bun run test
      - name: E2E
        run: bun run test:e2e

  logic-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test logic coverage
        run: bun run test:logic:coverage

      - uses: actions/upload-artifact@v4
        with:
          name: logic-coverage-lcov
          path: coverage/logic/lcov.info
          if-no-files-found: error
