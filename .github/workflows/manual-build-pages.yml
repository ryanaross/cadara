name: Manual Build and Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build in production mode
        env:
          NODE_ENV: production
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add run summary with page link
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          INDEX_URL="${PAGE_URL%/}/index.html"
          {
            echo "## Deployment ready"
            echo
            echo "- HTML page: [${INDEX_URL}](${INDEX_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
